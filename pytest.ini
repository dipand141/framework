[pytest]
# ─── Test Discovery ────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Allure ────────────────────────────────────────────────────────────────
addopts =
    --alluredir=reports/allure-results
    --clean-alluredir
    -v
    --tb=short
    --strict-markers

# ─── Custom Markers ────────────────────────────────────────────────────────
markers =
    ui: UI / layout behaviour tests
    ai_validation: AI response quality & hallucination tests
    security: Security injection & prompt-injection tests
    english: English-language test cases
    arabic: Arabic-language test cases
    smoke: Smoke / sanity gate tests
    accessibility: Axe-core accessibility assertions
    mobile: Mobile viewport tests
    slow: Tests expected to take > 15 s (skipped in fast mode)

# ─── Logging ───────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s – %(message)s
log_date_format = %H:%M:%S

# ─── Timeouts ──────────────────────────────────────────────────────────────
timeout = 120

# ─── Re-runs ───────────────────────────────────────────────────────────────
# Uncomment to auto-retry flaky network tests:
# reruns = 2
# reruns_delay = 3
